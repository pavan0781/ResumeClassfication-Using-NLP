services:
  - type: web
    name: resume-classifier-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt && python ../model/train_and_save.py --data_dir ../resumes_data
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
